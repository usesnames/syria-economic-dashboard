name: Update SCPR Data

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache downloaded PDFs
        uses: actions/cache@v4
        with:
          path: data/scpr_bulletins_cpi
          key: scpr-pdfs-${{ hashFiles('data/cpi_data.json') }}
          restore-keys: |
            scpr-pdfs-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cpi_data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update SCPR data [$(date -u +%Y-%m-%d)]"
            git push
          fi
